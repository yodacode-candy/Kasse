.ib-sep{width:1px;height:24px;background:var(--brd)}
#stats-bar{background:rgba(15,52,96,.5);border-bottom:1px solid var(--brd);padding:5px 10px;display:flex;gap:5px;flex-shrink:0;overflow-x:auto}

<script>
  // Service Worker als Blob inline registrieren (Chrome/Edge)
  if ('serviceWorker' in navigator) {
    var swCode = `
      const CACHE_NAME = 'rhd-tiles-v1';
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', function(e) {
        var url = e.request.url;
        if (url.includes('tile.openstreetmap.org') ||
            url.includes('opentopomap.org') ||
            url.includes('arcgisonline.com/ArcGIS')) {
          e.respondWith(
            caches.open('rhd-tiles-v1').then(cache =>
              cache.match(e.request).then(cached => {
                if (cached) return cached;
                return fetch(e.request.clone()).then(resp => {
                  if (resp && resp.status === 200) cache.put(e.request, resp.clone());
                  return resp;
                }).catch(() => new Response('', { status: 408 }));
              })
            )
          );
        }
      });
    `;
    var blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: '/' })
      .then(reg => console.log('SW aktiv'))
      .catch(err => console.warn('SW nicht verfügbar:', err));
  }
</script>

<script>
// ============================================================
// YODAcode RHD - Vollständige Anwendung
// ============================================================

var labelsVisible = true;
var map, drawnItems, tileLayerTopo, tileLayerEsri, tileLayerOsm;
var currentLayer = 'topo';
var units = [], objects = [], logEntries = [];
var labelMarkers = {}, gpsMarker = null, gpsCircle = null;
var pendingObjData = null, editingObjId = null, confirmCb = null;
var measureMode = false, pickerMode = false;
var measurePts = [], measurePolyline = null, measureMarkers = [];
var pickerMarker = null;
var idCtr = Date.now();
var utmGridVisible = false, utmGridSpacing = 1000, utmGridColor = '#00ff88', utmGridLines = [];
var offlineRect    = null;
var offlineArea    = null;
var offlineAbort   = false;
var offlineDrawing = false;
// === OBJEKT-LAYER ===
var activeLayer = 'trails';
var layerGroups = {};
var layerDefs = [
  { id: 'trails',      name: 'Trails',      color: '#4caf50', icon: 'hiking' },
  { id: 'suchgebiete', name: 'Suchgebiete', color: '#e94560', icon: 'search' },
  { id: 'sonstiges',   name: 'Sonstiges',   color: '#ff9800', icon: 'category' }
];



// Kacheln direkt cachen ohne Service Worker
async function fetchTileWithCache(url) {
  try {
    var cache = await caches.open('rhd-tiles-v1');
    var cached = await cache.match(url);
    if (cached) return cached;
    var response = await fetch(url, { mode: 'cors' });
    if (response && response.status === 200) {
      await cache.put(url, response.clone());
    }
    return response;
  } catch(e) {
    return null;
  }
}
// Kachel-Koordinaten Umrechnung
function tile2lon(x, z) { return (x / Math.pow(2, z) * 360 - 180); }
function tile2lat(y, z) {
  var n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
  return (180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n))));
}
function lon2tile(lon, z) { return Math.floor((lon + 180) / 360 * Math.pow(2, z)); }
function lat2tile(lat, z) {
  return Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) +
    1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
}

function countTiles(area, zMin, zMax) {
  var total = 0;
  for (var z = zMin; z <= zMax; z++) {
    var x0 = lon2tile(area.west,  z), x1 = lon2tile(area.east,  z);
    var y0 = lat2tile(area.north, z), y1 = lat2tile(area.south, z);
    total += (Math.abs(x1 - x0) + 1) * (Math.abs(y1 - y0) + 1);
  }
  return total * 3; // × 3 Layer (OSM, Topo, Esri)
}

// === UTM ===
function utmZone(lng) { return Math.floor((lng + 180) / 6) + 1; }
function utmProj(zone, lat) { return '+proj=utm +zone=' + zone + (lat >= 0 ? ' +north' : ' +south') + ' +ellps=WGS84 +datum=WGS84 +units=m +no_defs'; }

function toUTM(lat, lng) {
  if (typeof proj4 === 'undefined') return null;
  var zone = utmZone(lng);
  var proj = utmProj(zone, lat);
  var result = proj4('EPSG:4326', proj, [lng, lat]);
  return { zone: zone, hemi: lat >= 0 ? 'N' : 'S', e: result[0], n: result[1] };
}

function fmtUTM(utm) {
  if (!utm) return '—';
  return utm.zone + utm.hemi + ' ' + Math.round(utm.e) + ' E / ' + Math.round(utm.n) + ' N';
}

function getW3W(lat, lng) {
  var words = ['wald','berg','tal','bach','stein','moos','farn','eiche','birke','kiefer','wiese','feld'];
  var h1 = Math.abs(Math.floor(lat * 1000) % words.length);
  var h2 = Math.abs(Math.floor(lng * 1000) % words.length);
  var h3 = Math.abs(Math.floor((lat + lng) * 500) % words.length);
  return '///' + words[h1] + '.' + words[h2] + '.' + words[h3];
}

// === GEOMETRY ===
function calcGeom(obj) {
  obj.area = null; obj.length = null; obj.radius = null; obj.perimeter = null;
  try {
    if (obj.type === 'polygon') {
      var lls = obj.layer.getLatLngs()[0];
      if (typeof turf !== 'undefined') {
        var coords = lls.map(function(ll) { return [ll.lng, ll.lat]; });
        coords.push(coords[0]);
        obj.area = turf.area(turf.polygon([coords]));
      }
      var perim = 0;
      for (var i = 0; i < lls.length; i++) perim += lls[i].distanceTo(lls[(i+1) % lls.length]);
      obj.perimeter = perim;
    } else if (obj.type === 'circle') {
      obj.radius = obj.layer.getRadius();
      obj.area = Math.PI * obj.radius * obj.radius;
    } else if (obj.type === 'polyline') {
      var pts = obj.layer.getLatLngs();
      var d = 0;
      for (var j = 1; j < pts.length; j++) d += pts[j-1].distanceTo(pts[j]);
      obj.length = d;
    }
  } catch(e) {}
}

function getCentroid(obj) {
  try {
    if (obj.type === 'polygon') {
      var lls = obj.layer.getLatLngs()[0];
      var la = 0, lo = 0;
      lls.forEach(function(ll) { la += ll.lat; lo += ll.lng; });
      return L.latLng(la / lls.length, lo / lls.length);
    } else if (obj.type === 'circle') {
      return obj.layer.getLatLng();
    } else if (obj.type === 'polyline') {
      var pts = obj.layer.getLatLngs();
      return pts[Math.floor(pts.length / 2)];
    }
  } catch(e) {}
  return null;
}

  removeLabel(obj);

  if (obj.radius)    txt += '<br/>R=' + fmtDist(obj.radius);
  if (obj.perimeter) txt += '<br/>U=' + fmtDist(obj.perimeter);
  if (unit)          txt += '<br/><span style="color:#e94560;font-size:9px;">👥 ' + esc(unit.name) + '</span>';

  });

function updateTileEstimate() {
  if (!offlineArea) {
    document.getElementById('tile-estimate').textContent = '—';
    document.getElementById('tile-warn').style.display = 'none';
    return;
  }
  var zMin  = parseInt(document.getElementById('zoom-min').value);

  if (zMax < zMin) { document.getElementById('zoom-max').value = zMin; zMax = zMin; }
  var count = countTiles(offlineArea, zMin, zMax);
  var mb    = (count * 35 / 1024).toFixed(1);
  document.getElementById('tile-estimate').textContent =
    '~' + count + ' Kacheln · ~' + mb + ' MB (Zoom ' + zMin + '–' + zMax + ')';
  document.getElementById('tile-warn').style.display = count > 2000 ? 'block' : 'none';
}

function startOfflineAreaSelect() {
  if (offlineDrawing) return;
  offlineDrawing = true;
  var btn = document.getElementById('offline-area-btn');
  btn.style.color = '#ff9800';
  btn.innerHTML = '<span class="material-icons">crop_free</span>Bereich zeichnen…';
  map.getContainer().style.cursor = 'crosshair';
  toast('Klicken und ziehen um Bereich zu wählen', 'ok');

  var startPt = null;

  function onMouseDown(e) {
    startPt = e.latlng;
    if (offlineRect) { map.removeLayer(offlineRect); offlineRect = null; }
  }
  function onMouseMove(e) {
    if (!startPt) return;
    if (offlineRect) map.removeLayer(offlineRect);
    offlineRect = L.rectangle([startPt, e.latlng], {
      color: '#ff9800', weight: 2, dashArray: '6,4',
      fillColor: '#ff9800', fillOpacity: 0.08
    }).addTo(map);
  }
  function onMouseUp(e) {
    if (!startPt) return;
    var bounds = L.latLngBounds(startPt, e.latlng);
    offlineArea = {
      north: bounds.getNorth(), south: bounds.getSouth(),
      east:  bounds.getEast(),  west:  bounds.getWest()
    };
    cleanup();
    document.getElementById('offline-area-info').style.display = 'block';
    document.getElementById('offline-area-txt').textContent =
      'N ' + offlineArea.north.toFixed(4) + ' / S ' + offlineArea.south.toFixed(4) +
      ' / E ' + offlineArea.east.toFixed(4) + ' / W ' + offlineArea.west.toFixed(4);
    updateTileEstimate();
    toast('Bereich ausgewählt', 'ok');
  }
  function cleanup() {
    offlineDrawing = false;
    map.off('mousedown', onMouseDown);
    map.off('mousemove', onMouseMove);
    map.off('mouseup',   onMouseUp);
    map.getContainer().style.cursor = '';
    btn.style.color = '';
    btn.innerHTML = '<span class="material-icons">crop_free</span>Bereich auf Karte wählen';
    startPt = null;
  }

  map.on('mousedown', onMouseDown);
  map.on('mousemove', onMouseMove);
  map.on('mouseup',   onMouseUp);
}

async function downloadOfflineTiles() {
  if (!offlineArea) { toast('Bitte zuerst einen Bereich wählen', 'warn'); return; }
  var zMin = parseInt(document.getElementById('zoom-min').value);
  var zMax  = parseInt(document.getElementById('zoom-max').value);
  if (zMax < zMin) { toast('Zoom Max muss ≥ Zoom Min sein', 'warn'); return; }
  var total = countTiles(offlineArea, zMin, zMax);
  if (total > 2000) { toast('Bereich zu groß (' + total + ' Kacheln)', 'warn'); return; }

  var layers = [
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
  ];
  var subdomains = ['a', 'b', 'c'];

  offlineAbort = false;
  var done = 0, skipped = 0, errors = 0;

  document.getElementById('offline-progress-wrap').style.display = 'block';
  document.getElementById('offline-dl-btn').style.display        = 'none';
  document.getElementById('offline-abort-btn').style.display     = 'inline-flex';

  // Bereits gecachte URLs ermitteln
  var cache      = await caches.open('rhd-tiles-v1');
  var existing   = await cache.keys();
  var cachedUrls = new Set(existing.map(function(r) { return r.url; }));

  function updateProgress() {
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('offline-progress-txt').textContent =
      done + ' / ' + total + ' Kacheln' +
      (skipped ? ' (' + skipped + ' übersprungen)' : '') +
      (errors  ? ' · ' + errors + ' Fehler' : '');
    document.getElementById('offline-progress-pct').textContent = pct + '%';
    document.getElementById('offline-progress-bar').style.width = pct + '%';
  }

  for (var z = zMin; z <= zMax && !offlineAbort; z++) {
    var x0 = lon2tile(offlineArea.west,  z), x1 = lon2tile(offlineArea.east,  z);
    var y0 = lat2tile(offlineArea.north, z), y1 = lat2tile(offlineArea.south, z);
    if (x0 > x1) { var tmp = x0; x0 = x1; x1 = tmp; }
    if (y0 > y1) { var tmp = y0; y0 = y1; y1 = tmp; }

    for (var x = x0; x <= x1 && !offlineAbort; x++) {
      for (var y = y0; y <= y1 && !offlineAbort; y++) {
        for (var li = 0; li < layers.length && !offlineAbort; li++) {
          var tpl = layers[li];
          var sub = subdomains[Math.floor(Math.random() * subdomains.length)];
          var url = tpl
            .replace('{s}', sub)
            .replace('{z}', z)
            .replace('{x}', x)
            .replace('{y}', y);

          if (cachedUrls.has(url)) {
            skipped++; done++; updateProgress(); continue;
          }

          try {
            var resp = await fetch(url, { mode: 'cors' });
            if (resp && resp.status === 200) {
              await cache.put(url, resp);
            } else { errors++; }
          } catch(e) { errors++; }

          done++; updateProgress();
          if (done % 20 === 0) await new Promise(function(r) { setTimeout(r, 10); });
        }
      }
    }
  }

  document.getElementById('offline-dl-btn').style.display    = 'inline-flex';
  document.getElementById('offline-abort-btn').style.display = 'none';

  if (offlineAbort) {
    toast('Download abgebrochen (' + done + ' Kacheln)', 'warn');
  } else {
    toast('✓ ' + (done - errors) + ' Kacheln gespeichert!', 'ok');
    updateCacheBadge();
  }
}

async function clearOfflineCache() {
  try {
    await caches.delete('rhd-tiles-v1');
    document.getElementById('tile-badge').textContent = '0 Kacheln';
    document.getElementById('offline-progress-wrap').style.display = 'none';
    document.getElementById('offline-progress-bar').style.width    = '0%';
    toast('Offline-Cache gelöscht', 'ok');
  } catch(e) {
    toast('Cache konnte nicht gelöscht werden', 'warn');
  }
}

async function updateCacheBadge() {
  try {
    var cache = await caches.open('rhd-tiles-v1');
    var keys  = await cache.keys();
    var badge = document.getElementById('tile-badge');
    if (badge) badge.textContent = keys.length + ' Kacheln';
  } catch(e) {}
}

// === OFFLINE AREA SELECT ===
var offlineDrawing = false;
var offlineRect    = null;
var offlineArea    = null;

function startOfflineAreaSelect() {
  if (offlineDrawing) return;
  offlineDrawing = true;

  var btn = document.getElementById('offline-area-btn');
  if (btn) { btn.style.color = '#ff9800'; }
  toast('Klicken und ziehen um Bereich zu wählen', 'ok');

  // Leaflet-Panning deaktivieren
  map.dragging.disable();
  map.getContainer().style.cursor = 'crosshair';

  var startPt    = null;
  var startPixel = null;
  var mapContainer = map.getContainer();

  function onMouseDown(e) {
    if (e.button !== 0) return;
    startPixel = { x: e.clientX, y: e.clientY };
    startPt    = map.containerPointToLatLng(map.mouseEventToContainerPoint(e));
    if (offlineRect) { map.removeLayer(offlineRect); offlineRect = null; }
    L.DomEvent.stop(e);
  }

  function onMouseMove(e) {
    if (!startPt) return;
    var currentPt = map.containerPointToLatLng(map.mouseEventToContainerPoint(e));
    if (offlineRect) map.removeLayer(offlineRect);
    offlineRect = L.rectangle([startPt, currentPt], {
      color: '#ff9800', weight: 2, dashArray: '6,4',
      fillColor: '#ff9800', fillOpacity: 0.08,
      interactive: false
    }).addTo(map);
    L.DomEvent.stop(e);
  }

  function onMouseUp(e) {
    if (!startPt) return;
    var endPt  = map.containerPointToLatLng(map.mouseEventToContainerPoint(e));
    var bounds = L.latLngBounds(startPt, endPt);
    var dx = Math.abs(e.clientX - startPixel.x);
    var dy = Math.abs(e.clientY - startPixel.y);
    if (dx < 10 && dy < 10) {
      toast('Bereich zu klein — bitte ziehen', 'warn');
      startPt = null;
      return;
    }
    offlineArea = {
      north: bounds.getNorth(), south: bounds.getSouth(),
      east:  bounds.getEast(),  west:  bounds.getWest()
    };
    cleanup();
    toast('Bereich ausgewählt ✓', 'ok');
  }

  function onKeyDown(e) {
    if (e.key === 'Escape') {
      if (offlineRect) { map.removeLayer(offlineRect); offlineRect = null; }
      cleanup();
      toast('Bereichsauswahl abgebrochen', 'warn');
    }
  }

  function cleanup() {
    offlineDrawing = false;
    mapContainer.removeEventListener('mousedown', onMouseDown);
    mapContainer.removeEventListener('mousemove', onMouseMove);
    mapContainer.removeEventListener('mouseup',   onMouseUp);
    document.removeEventListener('keydown', onKeyDown);
    map.dragging.enable();
    map.getContainer().style.cursor = '';
    if (btn) { btn.style.color = ''; }
    startPt    = null;
    startPixel = null;
  }

  // Native DOM Events – NICHT über Leaflet!
  mapContainer.addEventListener('mousedown', onMouseDown);
  mapContainer.addEventListener('mousemove', onMouseMove);
  mapContainer.addEventListener('mouseup',   onMouseUp);
  document.addEventListener('keydown', onKeyDown);
}

function onMapClick(e) {
  if (measureMode) {
    measurePts.push(e.latlng);
    var m = L.circleMarker(e.latlng, { radius: 5, color: '#e94560', fillColor: '#e94560', fillOpacity: 1 }).addTo(map);
    measureMarkers.push(m);
    if (measurePolyline) map.removeLayer(measurePolyline);
    if (measurePts.length > 1) {
      measurePolyline = L.polyline(measurePts, { color: '#ff9800', weight: 2, dashArray: '6,4' }).addTo(map);
      var total = 0;
      for (var i = 1; i < measurePts.length; i++) total += measurePts[i-1].distanceTo(measurePts[i]);
      var seg = measurePts[measurePts.length-2].distanceTo(measurePts[measurePts.length-1]);
      document.getElementById('mbar-txt').textContent = 'Segment: ' + fmtDist(seg) + ' | Gesamt: ' + fmtDist(total);
    }
  } else if (pickerMode) {
    var lat = e.latlng.lat, lng = e.latlng.lng;
    if (pickerMarker) map.removeLayer(pickerMarker);
    pickerMarker = L.marker(e.latlng).addTo(map);
    var utm = toUTM(lat, lng);
    document.getElementById('cp-wgs').textContent = lat.toFixed(6) + '°N, ' + lng.toFixed(6) + '°E';
    document.getElementById('cp-utm').textContent = fmtUTM(utm);
    document.getElementById('cp-w3w').textContent = getW3W(lat, lng);
    var popup = document.getElementById('coord-popup');
    var pt = map.latLngToContainerPoint(e.latlng);
    popup.style.left = (pt.x + 20) + 'px';
    popup.style.top = (pt.y - 60) + 'px';
    popup.classList.add('show');
    document.getElementById('mbar-txt').textContent = 'UTM: ' + fmtUTM(utm);
  }
}

function toggleGrid() {

  var btn = document.getElementById('grid-toggle-btn');

  btn.style.color = utmGridVisible ? '#4caf50' : '';
  drawUTMGrid();
  toast('UTM-Gitter ' + (utmGridVisible ? 'an' : 'aus'), utmGridVisible ? 'ok' : '');
}
function drawUTMGrid() {
  utmGridLines.forEach(function(l) { try { map.removeLayer(l); } catch(e) {} });
  utmGridLines = [];
  
  var ov = document.getElementById('utm-label-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'utm-label-overlay';
    document.getElementById('map-wrap').appendChild(ov);
  }
  ov.innerHTML = '';
  
  if (!utmGridVisible || typeof proj4 === 'undefined') return;

  var b = map.getBounds();
  var cLat = b.getCenter().lat, cLng = b.getCenter().lng;
  var zone = utmZone(cLng), proj = utmProj(zone, cLat);
  var mapRect = map.getContainer().getBoundingClientRect();
  var W = mapRect.width, H = mapRect.height;

  function toU(ll) { return proj4('EPSG:4326', proj, [ll.lng, ll.lat]); }
  function fromU(en) {
    try { var r = proj4(proj, 'EPSG:4326', [en[0], en[1]]); return L.latLng(r[1], r[0]); }
    catch(e) { return null; }
  }

  var sw = toU(b.getSouthWest()), ne = toU(b.getNorthEast());
  var sp = utmGridSpacing;
  var eMin = Math.floor(sw[0]/sp)*sp, eMax = Math.ceil(ne[0]/sp)*sp;
  var nMin = Math.floor(sw[1]/sp)*sp, nMax = Math.ceil(ne[1]/sp)*sp;
  var sty = { color: utmGridColor, weight: 0.8, opacity: 0.65, pane: 'utmPane' };

  // Vertikale Linien (E-Wert) + Label am unteren Rand
  for (var e = eMin; e <= eMax; e += sp) {
    var pts = [];
    for (var i = 0; i <= 20; i++) {
      var ll = fromU([e, nMin + (nMax - nMin) * i / 20]);
      if (ll) pts.push(ll);
    }
    if (pts.length > 1) {
      utmGridLines.push(L.polyline(pts, sty).addTo(map));
      
      // Label: X-Position aus Mitte der Linie
      var midLL = pts[Math.floor(pts.length / 2)];
      var px = map.latLngToContainerPoint(midLL);
      if (px.x > 30 && px.x < W - 30) {
        var lbl = document.createElement('div');
        lbl.className = 'utm-lbl';
        lbl.textContent = sp >= 1000 ? (e/1000).toFixed(0) + ' E' : e + ' E';
        lbl.style.cssText = 'left:' + px.x + 'px;bottom:8px;transform:translateX(-50%);color:' + utmGridColor;
        ov.appendChild(lbl);
      }
    }
  }

  // Horizontale Linien (N-Wert) + Label am linken Rand
  for (var n = nMin; n <= nMax; n += sp) {
    var pts2 = [];
    for (var j = 0; j <= 20; j++) {
      var ll2 = fromU([eMin + (eMax - eMin) * j / 20, n]);
      if (ll2) pts2.push(ll2);
    }
    if (pts2.length > 1) {
      utmGridLines.push(L.polyline(pts2, sty).addTo(map));
      
      // Label: Y-Position aus Mitte der Linie
      var midLL2 = pts2[Math.floor(pts2.length / 2)];
      var py = map.latLngToContainerPoint(midLL2);
      if (py.y > 30 && py.y < H - 30) {
        var lbl2 = document.createElement('div');
        lbl2.className = 'utm-lbl';
        lbl2.textContent = sp >= 1000 ? (n/1000).toFixed(0) + ' N' : n + ' N';
        lbl2.style.cssText = 'top:' + py.y + 'px;left:6px;transform:translateY(-50%);color:' + utmGridColor;
        ov.appendChild(lbl2);
      }
    }
  }
}

// === LOG ===
function logAdd(txt, customTime) {
  var entry = {
    time: customTime || nowStr(),
    text: txt,
    manual: !!customTime  // markiert nachträgliche Einträge
  };
  logEntries.push(entry);

  // Chronologisch sortieren
  logEntries.sort(function(a, b) {
    return parseLogTime(a.time) - parseLogTime(b.time);
  });

  renderLogList();
}

function parseLogTime(timeStr) {
  // Deutsches Format: DD.MM.YYYY, HH:MM:SS → Date
  try {
    var parts = timeStr.split(', ');
    var dateParts = parts[0].split('.');
    var timeParts = parts[1] ? parts[1].split(':') : ['0','0','0'];
    return new Date(
      parseInt(dateParts[2]),
      parseInt(dateParts[1]) - 1,
      parseInt(dateParts[0]),
      parseInt(timeParts[0]),
      parseInt(timeParts[1]),
      parseInt(timeParts[2] || 0)
    ).getTime();
  } catch(e) {
    return 0;
  }
}

function saveLS() {
  try {
    var data = {
      units: units, logEntries: logEntries,
      objects: objects.map(function(o) {
        var geo = null;
        if (o.type === 'polygon') geo = o.layer.getLatLngs()[0].map(function(ll) { return { lat: ll.lat, lng: ll.lng }; });
        else if (o.type === 'circle') { var c = o.layer.getLatLng(); geo = { lat: c.lat, lng: c.lng }; }
        else if (o.type === 'polyline') geo = o.layer.getLatLngs().map(function(ll) { return { lat: ll.lat, lng: ll.lng }; });
        return { id: o.id, type: o.type, name: o.name, color: o.color, mapLayer: o.mapLayer, unitId: o.unitId, radius: o.radius || null, geo: geo };
      })
    };
    localStorage.setItem('rhd-data', JSON.stringify(data));
  } catch(e) {}
}
function loadLS() {
  try {
    var raw = localStorage.getItem('rhd-data'); if (!raw) return;
    var data = JSON.parse(raw);
    units = data.units || [];
    logEntries = data.logEntries || [];
    (data.objects || []).forEach(function(o) {
      var layer, sty = { color: o.color, fillColor: o.color, fillOpacity: .18, weight: 2 };
      if (o.type === 'polygon' && Array.isArray(o.geo))
        layer = L.polygon(o.geo.map(function(p) { return L.latLng(p.lat, p.lng); }), sty);
      else if (o.type === 'circle' && o.geo)
        layer = L.circle([o.geo.lat, o.geo.lng], Object.assign({ radius: o.radius || 100 }, sty));
      else if (o.type === 'polyline' && Array.isArray(o.geo))
        layer = L.polyline(o.geo.map(function(p) { return L.latLng(p.lat, p.lng); }), { color: o.color, weight: 3, opacity: .9 });
      if (layer) {
        var obj = { id: o.id, type: o.type, layer: layer, name: o.name, color: o.color, unitId: o.unitId, radius: o.radius || null };
        calcGeom(obj);
        drawnItems.addLayer(layer);
		obj.mapLayer = o.mapLayer || 'trails';
		var lg = layerGroups[obj.mapLayer];
		if (lg) lg.addLayer(layer);

        (function(ob) { layer.bindPopup(function() { return buildPopup(ob.id); }); })(obj);
        addLabel(obj);
        objects.push(obj);
      }
    });
  } catch(e) {}
}

// === EXPORT/IMPORT ===
function downloadFile(name, mime, content) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = name; a.click();
}
function exportGeoJSON() {
  var features = objects.map(function(o) {
    var geom;
    if (o.type === 'polygon') {
      var coords = o.layer.getLatLngs()[0].map(function(ll) { return [ll.lng, ll.lat]; });
      coords.push(coords[0]);
      geom = { type: 'Polygon', coordinates: [coords] };
    } else if (o.type === 'circle') {
      var c = o.layer.getLatLng();
      geom = { type: 'Point', coordinates: [c.lng, c.lat] };
    } else if (o.type === 'polyline') {
      geom = { type: 'LineString', coordinates: o.layer.getLatLngs().map(function(ll) { return [ll.lng, ll.lat]; }) };
    }
    return { type: 'Feature', geometry: geom, properties: { name: o.name, color: o.color, radius: o.radius } };
  });
  downloadFile('einsatz.geojson', 'application/json', JSON.stringify({ type: 'FeatureCollection', features: features }, null, 2));
  toast('GeoJSON exportiert', 'ok');
}
function exportGPX() {
  var trks = objects.filter(function(o) { return o.type === 'polyline'; });
  if (!trks.length) { toast('Keine Linien', 'warn'); return; }
  var gpx = '<?xml version="1.0"?>\n<gpx version="1.1" creator="YODAcode">\n';
  trks.forEach(function(o) {
    gpx += '<trk><name>' + esc(o.name) + '</name><trkseg>\n';
    o.layer.getLatLngs().forEach(function(ll) { gpx += '<trkpt lat="' + ll.lat + '" lon="' + ll.lng + '"/>\n'; });
    gpx += '</trkseg></trk>\n';
  });
  gpx += '</gpx>';
  downloadFile('einsatz.gpx', 'application/gpx+xml', gpx);
  toast('GPX exportiert', 'ok');
}
function importGeoJSON(txt) {
  try {
    var fc = JSON.parse(txt);
    var feats = fc.type === 'FeatureCollection' ? fc.features : [fc];
    var added = 0;
    feats.forEach(function(f) {
      if (!f.geometry) return;
      var layer, type, g = f.geometry;
      var color = (f.properties && f.properties.color) || '#0f3460';
      var name = (f.properties && f.properties.name) || 'Import';
      var sty = { color: color, fillColor: color, fillOpacity: .18, weight: 2 };
      if (g.type === 'Polygon') {
        layer = L.polygon(g.coordinates[0].map(function(c) { return L.latLng(c[1], c[0]); }), sty);
        type = 'polygon';
      } else if (g.type === 'LineString') {
        layer = L.polyline(g.coordinates.map(function(c) { return L.latLng(c[1], c[0]); }), { color: color, weight: 3 });
        type = 'polyline';
      } else if (g.type === 'Point' && f.properties && f.properties.radius) {
        layer = L.circle([g.coordinates[1], g.coordinates[0]], Object.assign({ radius: f.properties.radius }, sty));
        type = 'circle';
      }
      if (layer && type) {
        var obj = { id: genId(), type: type, layer: layer, name: name, color: color, unitId: null, radius: (f.properties && f.properties.radius) || null };
        calcGeom(obj); drawnItems.addLayer(layer);
        (function(o) { layer.bindPopup(function() { return buildPopup(o.id); }); })(obj);
        addLabel(obj); objects.push(obj); added++;
      }
    });
    renderAll(); saveLS();
    toast(added + ' Objekte importiert', 'ok');
  } catch(e) { toast('Import-Fehler', 'warn'); }
}
function importGPX(txt) {
  try {
    var parser = new DOMParser();
    var xml = parser.parseFromString(txt, 'application/xml');
    var tracks = xml.querySelectorAll('trk');
    var added = 0;
    tracks.forEach(function(trk) {
      var nameEl = trk.querySelector('name');
      var name = nameEl ? nameEl.textContent : 'GPX-Track';
      var pts = [];
      trk.querySelectorAll('trkpt').forEach(function(pt) {
        pts.push(L.latLng(parseFloat(pt.getAttribute('lat')), parseFloat(pt.getAttribute('lon'))));
      });
      if (pts.length > 1) {
        var layer = L.polyline(pts, { color: '#ff9800', weight: 3 });
        var obj = { id: genId(), type: 'polyline', layer: layer, name: name, color: '#ff9800', unitId: null };
        calcGeom(obj); drawnItems.addLayer(layer);
        (function(o) { layer.bindPopup(function() { return buildPopup(o.id); }); })(obj);
        addLabel(obj); objects.push(obj); added++;
      }
    });
    renderAll(); saveLS();
    toast(added + ' GPX-Tracks importiert', 'ok');
  } catch(e) { toast('GPX-Fehler', 'warn'); }
}

function getPdfFilename() {

// === HILFSFUNKTION: Karte korrekt auf Canvas rendern ===
async function renderMapToCanvas(scale) {
  scale = scale || 2;
  var mapEl = document.getElementById('map');

  // Overlays ausblenden für sauberen Basis-Screenshot
  var overlayPane = map.getPane('overlayPane');
  var markerPane  = map.getPane('markerPane');
  var origOverlayDisplay = overlayPane ? overlayPane.style.display : '';
  var origMarkerDisplay  = markerPane  ? markerPane.style.display  : '';
  if (overlayPane) overlayPane.style.display = 'none';
  if (markerPane)  markerPane.style.display  = 'none';

  var baseCanvas = await html2canvas(mapEl, {
    useCORS: true, allowTaint: true, scale: scale, logging: false
  });

  if (overlayPane) overlayPane.style.display = origOverlayDisplay;
  if (markerPane)  markerPane.style.display  = origMarkerDisplay;

  // Finales Canvas
  var finalCanvas = document.createElement('canvas');
  finalCanvas.width  = baseCanvas.width;
  finalCanvas.height = baseCanvas.height;
  var ctx = finalCanvas.getContext('2d');

  // Basiskarte zeichnen
  ctx.drawImage(baseCanvas, 0, 0);

  // === Polygone / Kreise / Linien zeichnen ===
  map.eachLayer(function(layer) {

    if (layer instanceof L.Polygon || layer instanceof L.Polyline) {
      var latlngs = layer.getLatLngs();
      if (Array.isArray(latlngs[0]) && latlngs[0][0] instanceof L.LatLng) {
        latlngs = latlngs[0];
      }
      if (!latlngs.length) return;

      ctx.beginPath();
      latlngs.forEach(function(ll, i) {
        var pt = map.latLngToContainerPoint(ll);
        if (i === 0) ctx.moveTo(pt.x * scale, pt.y * scale);
        else         ctx.lineTo(pt.x * scale, pt.y * scale);
      });
      ctx.closePath();

      var sty = layer.options;
      if (layer instanceof L.Polygon && sty.fillColor) {
        ctx.fillStyle   = sty.fillColor;
        ctx.globalAlpha = sty.fillOpacity !== undefined ? sty.fillOpacity : 0.3;
        ctx.fill();
      }
      ctx.globalAlpha = sty.opacity !== undefined ? sty.opacity : 1;
      ctx.strokeStyle = sty.color  || '#3388ff';
      ctx.lineWidth   = (sty.weight || 3) * scale;
      ctx.stroke();
      ctx.globalAlpha = 1;

    } else if (layer instanceof L.Circle) {
      var center   = layer.getLatLng();
      var centerPt = map.latLngToContainerPoint(center);
      var edgeLatLng = map.containerPointToLatLng(
        map.latLngToContainerPoint(center).add([0, 1])
      );
      var mPerPx   = center.distanceTo(edgeLatLng);
      var radiusPx = layer.getRadius() / mPerPx;

      ctx.beginPath();
      ctx.arc(centerPt.x * scale, centerPt.y * scale, radiusPx * scale, 0, Math.PI * 2);
      var sty = layer.options;
      if (sty.fillColor) {
        ctx.fillStyle   = sty.fillColor;
        ctx.globalAlpha = sty.fillOpacity !== undefined ? sty.fillOpacity : 0.3;
        ctx.fill();
      }
      ctx.globalAlpha = sty.opacity !== undefined ? sty.opacity : 1;
      ctx.strokeStyle = sty.color  || '#3388ff';
      ctx.lineWidth   = (sty.weight || 3) * scale;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  });

  // === Labels zeichnen ===
  objects.forEach(function(obj) {
    var c = getCentroid(obj);
    if (!c) return;
    var pt = map.latLngToContainerPoint(c);
    var px = pt.x * scale;
    var py = pt.y * scale;

    var lines = [obj.name || 'Objekt'];
    if (obj.area)      lines.push(fmtArea(obj.area));
    if (obj.length)    lines.push(fmtDist(obj.length));
    if (obj.radius)    lines.push('R=' + fmtDist(obj.radius));
    if (obj.perimeter) lines.push('U=' + fmtDist(obj.perimeter));

    var fontSize   = 20;
    var lineHeight = fontSize + 4;
    ctx.font = 'bold ' + fontSize + 'px Segoe UI, sans-serif';
    var maxW = 0;
    lines.forEach(function(l) { var w = ctx.measureText(l).width; if (w > maxW) maxW = w; });

    var padX = 12, padY = 8;
    var boxW = maxW + padX * 2;
    var boxH = lines.length * lineHeight + padY * 2;
    var bx   = px - boxW / 2;
    var by   = py - boxH / 2;
    var r    = 8;

    ctx.globalAlpha = 0.92;
    ctx.fillStyle   = 'rgba(22, 33, 62, 0.92)';
    ctx.strokeStyle = obj.color || '#e94560';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.moveTo(bx + r, by);
    ctx.lineTo(bx + boxW - r, by);
    ctx.quadraticCurveTo(bx + boxW, by, bx + boxW, by + r);
    ctx.lineTo(bx + boxW, by + boxH - r);
    ctx.quadraticCurveTo(bx + boxW, by + boxH, bx + boxW - r, by + boxH);
    ctx.lineTo(bx + r, by + boxH);
    ctx.quadraticCurveTo(bx, by + boxH, bx, by + boxH - r);
    ctx.lineTo(bx, by + r);
    ctx.quadraticCurveTo(bx, by, bx + r, by);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.globalAlpha  = 1;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'top';
    lines.forEach(function(line, i) {
      ctx.font      = i === 0 ? 'bold ' + fontSize + 'px Segoe UI, sans-serif'
                               : (fontSize - 2) + 'px Segoe UI, sans-serif';
      ctx.fillStyle = i === 0 ? '#ffffff' : '#aaaaaa';
      ctx.fillText(line, px, by + padY + i * lineHeight);
    });
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'alphabetic';
  });

  return finalCanvas;
}

// Hilfsfunktion: Elevation über mehrere APIs abrufen
async function fetchElevations(sampled) {
  const lats = sampled.map(ll => ll.lat);
  const lngs = sampled.map(ll => ll.lng);

  // --- Versuch 1: Open-Meteo ---
  try {
    const url = 'https://api.open-meteo.com/v1/elevation?latitude=' +
      lats.join(',') + '&longitude=' + lngs.join(',');
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      if (data.elevation && data.elevation.length === sampled.length)
        return data.elevation;
    }
  } catch(e) { console.warn('Open-Meteo fehlgeschlagen:', e); }

  // --- Versuch 2: Open Topo Data (SRTM 90m) ---
  try {
    const locations = sampled.map(ll => ll.lat + ',' + ll.lng).join('|');
    const url = 'https://api.opentopodata.org/v1/srtm90m?locations=' + locations;
    const res = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      if (data.status === 'OK')
        return data.results.map(r => r.elevation);
    }
  } catch(e) { console.warn('OpenTopoData fehlgeschlagen:', e); }

  // --- Versuch 3: Open-Elevation ---
  try {
    const locations = sampled.map(ll => ({ latitude: ll.lat, longitude: ll.lng }));
    const res = await fetch('https://api.open-elevation.com/api/v1/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ locations })
    });
    if (res.ok) {
      const data = await res.json();
      return data.results.map(r => r.elevation);
    }
  } catch(e) { console.warn('Open-Elevation fehlgeschlagen:', e); }

  throw new Error('Alle Elevation-APIs nicht erreichbar. Bitte Internetverbindung prüfen.');
}

async function loadElevationProfile() {
  var sel = document.getElementById('elev-select');
  if (!sel || !sel.value) { toast('Bitte eine Linie auswählen', 'warn'); return; }

  var obj = objects.find(function(o) { return o.id === parseInt(sel.value); });
  if (!obj || obj.type !== 'polyline') { toast('Kein gültiges Linienobjekt', 'warn'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="material-icons">hourglass_empty</span>Lade Höhendaten...';
  toast('Höhendaten werden abgerufen...', 'ok');

  try {
    var latlngs = obj.layer.getLatLngs();

    // Punkte gleichmäßig samplen (max 100 Punkte für API)
    var maxPts = 100;
    var step   = Math.max(1, Math.floor(latlngs.length / maxPts));
    var sampled = [];
    for (var i = 0; i < latlngs.length; i += step) sampled.push(latlngs[i]);
    if (sampled[sampled.length - 1] !== latlngs[latlngs.length - 1]) {
      sampled.push(latlngs[latlngs.length - 1]);
    }

    // Distanzen berechnen
    var distances = [0];
    for (var j = 1; j < sampled.length; j++) {
      distances.push(distances[j - 1] + sampled[j - 1].distanceTo(sampled[j]));
    }

    // Open-Elevation API abfragen
 //   var locations = sampled.map(function(ll) {
 //     return { latitude: ll.lat, longitude: ll.lng };
 //   });

 //   var lats = sampled.map(function(ll) { return ll.lat; }).join(',');
//	var lngs = sampled.map(function(ll) { return ll.lng; }).join(',');
	//var response = await fetch(
	//  'https://api.open-meteo.com/v1/elevation?latitude=' + lats + '&longitude=' + lngs
	//);
	//if (!response.ok) throw new Error('API nicht erreichbar');
	//var data = await response.json();
	//var elevations = data.elevation; 

	var elevations = await fetchElevations(sampled);

    // Statistiken berechnen
    var minElev  = Math.min.apply(null, elevations);
    var maxElev  = Math.max.apply(null, elevations);
    var totalDist = distances[distances.length - 1];
    var ascent   = 0, descent = 0;
    for (var k = 1; k < elevations.length; k++) {
      var diff = elevations[k] - elevations[k - 1];
      if (diff > 0) ascent  += diff;
      else          descent += Math.abs(diff);
    }

    // Stats anzeigen
    var statsEl = document.getElementById('elev-stats');
    statsEl.innerHTML =
      elevStatBox('▲ Max', Math.round(maxElev) + ' m') +
      elevStatBox('▼ Min', Math.round(minElev) + ' m') +
      elevStatBox('⬆ Aufstieg', Math.round(ascent) + ' m') +
      elevStatBox('⬇ Abstieg', Math.round(descent) + ' m') +
      elevStatBox('↔ Länge', fmtDist(totalDist));

    // Diagramm zeichnen
    drawElevationChart(distances, elevations, obj.color || '#e94560');

toast('Höhenprofil geladen', 'ok');

  } catch(e) {

function elevStatBox(label, value) {
  return '<div style="background:rgba(255,255,255,.05);border:1px solid var(--brd);border-radius:6px;' +
         'padding:4px 8px;text-align:center;flex:1;min-width:52px;">' +
         '<div style="font-size:.95rem;font-weight:700;color:var(--ac);">' + value + '</div>' +

function drawElevationChart(distances, elevations, color) {
  var canvas = document.getElementById('elev-canvas');
  
  // Zuerst Result-Div anzeigen, dann zeichnen
  document.getElementById('elev-result').style.display = 'block';
  
  // Auf nächsten Frame warten damit Layout berechnet wird
  requestAnimationFrame(function() {
    var dpr = window.devicePixelRatio || 1;
    
    // Feste Fallback-Größe falls offsetWidth noch 0
    var W = canvas.offsetWidth  || 260;
    var H = canvas.offsetHeight || 140;
    
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    var padL = 42, padR = 10, padT = 12, padB = 28;
    var chartW = W - padL - padR;
    var chartH = H - padT - padB;

    var minE   = Math.min.apply(null, elevations);
    var maxE   = Math.max.apply(null, elevations);
    var rangeE = maxE - minE || 1;
    var maxD   = distances[distances.length - 1] || 1;

    function xPx(d) { return padL + (d / maxD) * chartW; }
    function yPx(e) { return padT + chartH - ((e - minE) / rangeE) * chartH; }

    ctx.clearRect(0, 0, W, H);

    // Hintergrund
    ctx.fillStyle = 'rgba(15, 15, 35, 0.6)';
    ctx.fillRect(0, 0, W, H);

    // Gitterlinien
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth   = 1;
    for (var g = 0; g <= 4; g++) {
      var gy = padT + (chartH / 4) * g;
      ctx.beginPath();
      ctx.moveTo(padL, gy);
      ctx.lineTo(padL + chartW, gy);
      ctx.stroke();
    }

    // Fläche unter der Kurve (Gradient)
    var grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
    grad.addColorStop(0, color + 'bb');
    grad.addColorStop(1, color + '11');
    ctx.beginPath();
    ctx.moveTo(xPx(distances[0]), yPx(elevations[0]));
    for (var i = 1; i < distances.length; i++) {
      ctx.lineTo(xPx(distances[i]), yPx(elevations[i]));
    }
    ctx.lineTo(xPx(distances[distances.length - 1]), padT + chartH);
    ctx.lineTo(xPx(distances[0]), padT + chartH);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Profil-Linie
    ctx.beginPath();
    ctx.moveTo(xPx(distances[0]), yPx(elevations[0]));
    for (var i = 1; i < distances.length; i++) {
      ctx.lineTo(xPx(distances[i]), yPx(elevations[i]));
    }
    ctx.strokeStyle = color;
    ctx.lineWidth   = 2.5;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.stroke();

    // Y-Achse Beschriftung
    ctx.fillStyle  = 'rgba(180,180,180,0.85)';
    ctx.font       = '10px Segoe UI, sans-serif';
    ctx.textAlign  = 'right';
    ctx.textBaseline = 'middle';
    for (var g = 0; g <= 4; g++) {
      var elev = minE + (rangeE / 4) * (4 - g);
      var gy   = padT + (chartH / 4) * g;
      ctx.fillText(Math.round(elev) + 'm', padL - 4, gy);
    }

    // X-Achse Beschriftung
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'alphabetic';
    var steps = 4;
    for (var s = 0; s <= steps; s++) {
      var d  = (maxD / steps) * s;
      var xp = xPx(d);
      ctx.fillText(fmtDist(d), xp, H - 6);
    }

    // Rahmen
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth   = 1;
    ctx.strokeRect(padL, padT, chartW, chartH);
  });
}

// Aktiven Layer wechseln
function setActiveLayer(layerId) {
  activeLayer = layerId;
  layerDefs.forEach(function(ld) {
    var row = document.getElementById('layer-row-' + ld.id);
    var lbl = document.getElementById('layer-lbl-' + ld.id);
    var def = layerDefs.find(function(l) { return l.id === ld.id; });
    if (row) row.style.borderColor = (ld.id === layerId) ? def.color : 'var(--brd)';
    if (lbl) {
      lbl.style.fontWeight = (ld.id === layerId) ? 'bold' : 'normal';
      lbl.style.color = (ld.id === layerId) ? def.color : '';
    }
  });
  toast('Aktiver Layer: ' + layerDefs.find(function(l) { return l.id === layerId; }).name, 'ok');
}


// Layer ein-/ausblenden
function toggleLayerVisible(layerId) {
  var lg = layerGroups[layerId];
  var btn = document.getElementById('layer-eye-' + layerId);
  if (!lg || !btn) return;

  if (map.hasLayer(lg)) {
    // --- Ausblenden ---
    map.removeLayer(lg);
    btn.innerHTML = '<span class="material-icons" style="font-size:17px;color:var(--txm);">visibility_off</span>';
    // Labels aller Objekte dieses Layers ausblenden
    objects.forEach(function(o) {
      if (o.mapLayer === layerId && labelMarkers[o.id]) {
        map.removeLayer(labelMarkers[o.id]);
      }
    });
  } else {
    // --- Einblenden ---
    map.addLayer(lg);
    btn.innerHTML = '<span class="material-icons" style="font-size:17px;">visibility</span>';
    // Labels aller Objekte dieses Layers wieder einblenden (nur wenn Labels global sichtbar)
    objects.forEach(function(o) {
      if (o.mapLayer === layerId && labelMarkers[o.id] && labelsVisible) {
        labelMarkers[o.id].addTo(map);
      }
    });
  }
}
